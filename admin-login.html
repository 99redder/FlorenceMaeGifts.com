<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Florence Mae Gifts</title>
  <link rel="icon" href="images/favicon.png" />
  <link rel="stylesheet" href="./fmg.css" />
  <style>
    html { min-height:100%; }
    body {
      min-height:100vh;
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0;
      padding:2rem 1rem;
      box-sizing:border-box;
      background:#f7f1ea;
      color:#3d2b24;
      font-family:Arial, sans-serif;
    }
    .login-card { width:min(92vw, 420px); margin:auto; background:#fffaf5; border:1px solid rgba(90,61,49,.18); border-radius:18px; box-shadow:0 18px 50px rgba(61,43,36,.12); overflow:hidden; }
    .login-card img { width:100%; aspect-ratio:32/9; object-fit:cover; display:block; border-bottom:1px solid rgba(90,61,49,.14); }
    form { padding:1.5rem; display:flex; flex-direction:column; gap:.9rem; }
    h1 { font-size:1.5rem; margin:.1rem 0 .2rem; }
    label { font-size:.9rem; font-weight:700; }
    input { width:100%; box-sizing:border-box; border:1px solid rgba(90,61,49,.28); border-radius:10px; padding:.75rem .85rem; font-size:1rem; background:white; }
    button { border:0; border-radius:999px; padding:.85rem 1rem; background:#7a4e3a; color:white; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.65; cursor:wait; }
    .error { min-height:1.2rem; color:#b42318; font-size:.92rem; }
  </style>
</head>
<body>
  <section class="login-card" aria-labelledby="login-title">
    <img src="./images/banner3.png" alt="Florence Mae Gifts" />
    <form id="admin-login-form">
      <h1 id="login-title">Admin Login</h1>
      <div>
        <label for="admin-user">Username</label>
        <input id="admin-user" name="username" autocomplete="username" required />
      </div>
      <div>
        <label for="admin-pass">Password</label>
        <input id="admin-pass" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button id="admin-login-submit" type="submit">Login</button>
      <div class="error" id="admin-login-error" role="alert"></div>
    </form>
  </section>
  <script>
    const form = document.getElementById('admin-login-form');
    const errorEl = document.getElementById('admin-login-error');
    const submitBtn = document.getElementById('admin-login-submit');

    fetch('/api/admin/verify-session', { credentials: 'same-origin' })
      .then((res) => { if (res.ok) window.location.href = './admin.html'; })
      .catch(() => {});

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';
      submitBtn.disabled = true;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('admin-user').value,
            password: document.getElementById('admin-pass').value
          })
        });
        if (res.ok) {
          window.location.href = './admin.html';
          return;
        }
        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.error || (res.status === 429 ? 'Too many failed attempts. Try again later.' : 'Invalid username or password.');
      } catch (err) {
        errorEl.textContent = 'Login failed. Please try again.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
