<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled • Florence Mae Gifts</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#ffffff;color:#000;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:620px;width:100%;background:#fff;border:1px solid #d8d8d8;border-radius:8px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.12);text-align:center}
    .header{padding:20px 24px;background:linear-gradient(135deg,#fecac4 0%,#FEA0AE 100%);border-bottom:1px solid #fecac4}
    .header h1{margin:0;font-size:20px}
    .body{padding:24px}
    .icon{width:64px;height:64px;border-radius:50%;margin:0 auto 14px;background:#dc2626;color:#fff;display:grid;place-items:center;font-size:32px}
    .footer{padding:14px 24px;border-top:1px solid #a3a3a3;background:#b7b7b7;color:#222}
    a{color:#FE6666;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <img src="./images/banner3.png" alt="Florence Mae Gifts" style="width:100%;display:block" />
    <div class="header"><h1>Florence Mae Gifts</h1></div>
    <div class="body">
      <div class="icon">✕</div>
      <h2>Payment Cancelled</h2>
      <p>Your payment was cancelled or backed out before completion. You can return to your invoice email and complete payment anytime.</p>
    </div>
    <div class="footer">
      Questions? Contact me here: <a href="mailto:contact@florencemaegifts.com">contact@florencemaegifts.com</a>
    </div>
  </div>
</body>
</html>
