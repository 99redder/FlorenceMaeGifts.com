name = "fmg-stripe-api"
main = "src/worker.js"
compatibility_date = "2026-02-12"

[[d1_databases]]
binding = "DB"
database_name = "florence-mae-gifts-admin"
database_id = "381735a9-b25c-4f5d-9e21-24db3b997d10"

[vars]
ALLOWED_ORIGINS = "https://www.florencemaegifts.com"

# Required secrets (set via `wrangler secret put`): RESEND_API_KEY, ADMIN_PASS (or legacy ADMIN_PASSWORD), ADMIN_SESSION_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# Optional admin username secret: ADMIN_USER (defaults to "admin" if omitted)
# Optional: map item names to fallback price ids if client doesn't send one.
# Required for shop checkout: set STORE_ALLOWED_PRICE_IDS as a Worker secret (comma-separated price IDs).
# ITEM_PRICE_MAP = '{"Example Item":"price_..."}'
# Map digital item names to private R2 object keys for one-time download links.
DOWNLOAD_FILE_MAP = '{"Four Star Ball Crochet Baby Hat Pattern - Beginner Level (PDF Download Only)":"four-star-ball-crochet-baby-hat-pattern.pdf","Crochet Baby Hat Pattern: Five Point Design (PDF Download Only)":"crochet-baby-hat-pattern-five-point-design.pdf","Gohan Inspired Hat Pattern - Beginner Level (PDF Download Only)":"four-star-ball-crochet-baby-hat-pattern.pdf","Goku Inpsired Baby Hat Pattern - Beginner Level (PDF Download Only)":"crochet-baby-hat-pattern-five-point-design.pdf","Goku Inspired Baby Hat Pattern - Beginner Level (PDF Download Only)":"crochet-baby-hat-pattern-five-point-design.pdf"}'
# One-time link settings.
DOWNLOAD_BASE_URL = "https://www.florencemaegifts.com/api/download"
DOWNLOAD_TOKEN_TTL_SECONDS = "86400"
DOWNLOAD_TOKEN_MAX_USES = "3"
# Sender email must be a verified Resend domain/sender.
# Optional: set ORDER_EMAIL_ALERT_TO to route failed order-email/download alerts separately; defaults to CONTACT_TO_EMAIL.
RESEND_FROM_EMAIL = "Florence Mae Gifts <orders@florencemaegifts.com>"
SUPPORT_EMAIL = "florencemaegifts@outlook.com"
CONTACT_TO_EMAIL = "contact@florencemaegifts.com"

[[r2_buckets]]
binding = "DOWNLOADS_BUCKET"
bucket_name = "fmg"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "fmg-receipts"

[[kv_namespaces]]
binding = "DOWNLOAD_TOKENS"
id = "7350d3bd812644928452170df7b380ec"
